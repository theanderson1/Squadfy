version: '3.9'

services:
  api:
    build: .
    container_name: squadfy_api
    ports:
      - "3333:3333"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql://postgres:admin@postgres:5432/knowledge_db
      - GROQ_API_KEY=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

  postgres:
    image: postgres:16
    container_name: knowledge_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: knowledge_db
    ports:
      - "5432:5432"